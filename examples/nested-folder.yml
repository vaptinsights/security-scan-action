name: VAPT Insights Nested Folder Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    name: Scan nested application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan SMS service
        uses: vaptinsights/security-scan-action@v1
        with:
          api-key: ${{ secrets.VAPT_INSIGHTS_API_KEY }}
          scan-path: services/sms-service
          artifact-name: ${{ github.event.repository.name }}/sms-service
